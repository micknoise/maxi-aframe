<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Example 23 - Chorus</title>
  <script src="./enable-threads.js"></script>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="./aframe.min.js"></script>
  <script src="./maxi-components.js"></script>
  <style>
    body { margin: 0; background: #10161a; color: #e8ecf1; font-family: monospace; }
    #ui { position: fixed; left: 12px; top: 12px; z-index: 1000; background: rgba(0,0,0,0.6); padding: 10px; }
  </style>
</head>
<body>
  <div id="ui">
    <button id="playButton">loading...</button>
    <div>Converted from 23.Chorus (adapted to oscillator source)</div>
    <a href="./index.html">Back</a>
  </div>
  <a-scene maxi-patch="output: #out" renderer="antialias: true">
    <a-entity id="camera" camera="userHeight: 0" position="0 1.6 4" look-controls></a-entity>
    <a-entity id="src" maxi-osc="type: saw; freq: 130"></a-entity>
    <a-entity id="chor" maxi-chorus="input: #src; delayLength: 25; lfoSpeed: 0.7; lfoDepth: 0.7; mix: 0.7"></a-entity>
    <a-entity id="out" maxi-gain="input: #chor; gain: 0.18"></a-entity>
    <a-dodecahedron position="0 1.2 -2.7" radius="0.8" color="#22d3ee" animation="property: rotation; to: 360 180 360; loop: true; dur: 6000"></a-dodecahedron>
    <a-sky color="#10161a"></a-sky>
  </a-scene>
</body>
</html>
