<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Example 5 - FM1</title>
  <script src="./enable-threads.js"></script>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="./aframe.min.js"></script>
  <script src="./maxi-components.js"></script>
  <style>
    body { margin: 0; background: #0f1714; color: #e8ecf1; font-family: monospace; }
    #ui { position: fixed; left: 12px; top: 12px; z-index: 1000; background: rgba(0,0,0,0.6); padding: 10px; }
  </style>
</head>
<body>
  <div id="ui">
    <button id="playButton">loading...</button>
    <div>Converted from 5.FM1: carrier 440 + mod(1Hz)*100</div>
    <a href="./index.html">Back</a>
  </div>
  <a-scene maxi-patch="output: #out" renderer="antialias: true">
    <a-entity id="camera" camera="userHeight: 0" position="0 1.6 4" look-controls></a-entity>
    <a-entity id="mod" maxi-osc="type: sinewave; freq: 1; scale: 100; offset: 440"></a-entity>
    <a-entity id="car" maxi-osc="type: sinewave; freq: #mod"></a-entity>
    <a-entity id="out" maxi-gain="input: #car; gain: 0.2"></a-entity>
    <a-torus-knot position="0 1.3 -3" radius="0.6" radius-tubular="0.08" color="#34d399" animation="property: rotation; to: 360 360 0; loop: true; dur: 8000"></a-torus-knot>
    <a-sky color="#0f1714"></a-sky>
  </a-scene>
</body>
</html>
