<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Example 1 - TestTone</title>
  <script src="./enable-threads.js"></script>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="./aframe.min.js"></script>
  <script src="./maxi-components.js"></script>
  <style>
    body { margin: 0; background: #10151d; color: #e8ecf1; font-family: monospace; }
    #ui { position: fixed; left: 12px; top: 12px; z-index: 1000; background: rgba(0,0,0,0.6); padding: 10px; }
  </style>
</head>
<body>
  <div id="ui">
    <button id="playButton">loading...</button>
    <div>Converted from 1.TestTone</div>
    <a href="./index.html">Back</a>
  </div>
  <a-scene maxi-patch="output: #out" renderer="antialias: true">
    <a-entity id="camera" camera="userHeight: 0" position="0 1.6 4" look-controls></a-entity>
    <a-entity id="osc" maxi-osc="type: sinewave; freq: 440"></a-entity>
    <a-entity id="out" maxi-gain="input: #osc; gain: 0.2"></a-entity>
    <a-box position="0 1 -2" color="#60a5fa" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-box>
    <a-sky color="#10151d"></a-sky>
  </a-scene>
</body>
</html>
